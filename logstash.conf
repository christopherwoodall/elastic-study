# Accepts data sent over TCP (e.g., from an app or a shipper)
  tcp {
    port => 5044
    codec => json
  }
}

filter {
  # Add your data transformation/Grok filters here if needed
}

output {
  # Sends the processed data straight to your ES container
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logstash-logs-%{+YYYY.MM.dd}"
  }
}